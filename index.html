<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Syncromind</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            background-color: #000A12;
        }

        html,
        body {
            width: 100%;
            min-height: 100%;
        }

        .logo {
            display: flex;
            width: 100%;
            min-height: 100vh;
            min-height: 100dvh;
            justify-content: center;
            align-items: center;
            padding: 24px;
        }

        .logo img {
            width: min(90vw, 680px);
            height: auto;
            display: block;
            object-fit: contain;
        }

        @media (max-width: 480px) {
            .logo {
                padding: 16px;
            }

            .logo img {
                width: min(92vw, 420px);
            }
        }
    </style>
</head>
<body>
    <div class="logo">
        <img src="logo_syncromind.jpg" alt="Syncromind Logo">
    </div>
</body>
</html>
